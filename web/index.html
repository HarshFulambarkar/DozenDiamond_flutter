  <script>
    function openRazorpayCheckout(optionsJson) {

      var options = JSON.parse(optionsJson);

      // Define success handler
      options.handler = function (response) {
        // Call Flutter's success callback
        if (window.paymentSuccessHandler) {
          window.paymentSuccessHandler(response);
        }
      };

      // Define failure handler
      options.modal = {
        ondismiss: function () {
          if (window.paymentFailureHandler) {
            window.paymentFailureHandler();
          }
        }
      };

      var rzp1 = new Razorpay(options);
      rzp1.open();
    }
  </script>
